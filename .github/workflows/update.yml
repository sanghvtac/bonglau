name: Crawl ThienDinh

on:
  schedule:
    # Chạy mỗi giờ từ 17h chiều đến 5h sáng VN (tương ứng 10h sáng - 22h đêm UTC)
    - cron: '0 10-22,0-2 * * *' 
  workflow_dispatch: # Cho phép bấm nút "Run workflow" thủ công trên GitHub

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v3
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-chromium

      - name: Install dependencies
        run: |
          # Cài đặt các thư viện cần thiết cho việc ghép ảnh và tải dữ liệu
          pip install playwright requests Pillow
          # Chỉ cài trình duyệt nếu chưa có trong bộ nhớ đệm (cache)
          if [ "${{ steps.playwright-cache.outputs.cache-hit }}" != "true" ]; then
            playwright install chromium
          fi

      - name: Run script
        run: python crawl_thiendinh2.py # Đảm bảo tên file này khớp với file .py của bạn

      - name: Commit and Push results
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-update Base64 Images ${{ github.event.repository.updated_at }}"
          file_pattern: 'thiendinh.json thiendinh_vlc.txt thiendinh_iptv.txt'
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"
