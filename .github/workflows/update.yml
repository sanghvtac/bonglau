name: Crawl ThienDinh & ChuoiChien

on:
  schedule:
    # Chạy 3 lần/ngày vào 18:00, 21:00, 00:00 giờ VN
    # Giờ VN (UTC+7) -> UTC: 18h=11h, 21h=14h, 00h=17h
    - cron: '0 11,14,17 * * *'
  workflow_dispatch:

jobs:
  crawl:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-playwright-pillow
          restore-keys: ${{ runner.os }}-pip-

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/requirements.txt') }}-chromium
          restore-keys: ${{ runner.os }}-playwright-

      - name: Install dependencies
        run: |
          pip install playwright requests Pillow --quiet
          if [ "${{ steps.playwright-cache.outputs.cache-hit }}" != "true" ]; then
            playwright install chromium --with-deps
          fi

      # continue-on-error: nếu thiendinh lỗi/timeout thì vẫn tiếp tục chạy chuoichien
      - name: Run ThienDinh crawler
        continue-on-error: true
        run: python crawl_thiendinh.py

      - name: Run ChuoiChien crawler
        continue-on-error: true
        run: python crawl_chuoichien.py

      - name: Commit and push results
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: auto-update ${{ github.run_id }}"
          file_pattern: >-
            thiendinh.json thiendinh_iptv.txt thiendinh_vlc.txt
            chuoichien.json chuoichien_iptv.txt chuoichien_vlc.txt
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"
