name: Crawl ThienDinh

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 cloudscraper

      - name: Run script
        run: python crawl_thiendinh.py

      - name: Auto Commit Results
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-update stream links"
          file_pattern: 'thiendinh.json thiendinh_vlc.txt thiendinh_iptv.txt'
