name: Crawl ThienDinh

on:
  schedule:
    # Chạy mỗi giờ từ 17h chiều đến 5h sáng hôm sau
    - cron: '0 17-23,0-5 * * *' 
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # CẤU HÌNH CACHE CHO PLAYWRIGHT
      - name: Get Playwright cache path
        id: playwright-cache
        run: echo "path=~/.cache/ms-playwright" >> $GITHUB_OUTPUT

      - name: Cache Playwright
        uses: actions/cache@v3
        with:
          path: ${{ steps.playwright-cache.outputs.path }}
          key: ${{ runner.os }}-playwright-1.40.0

      - name: Install dependencies
        run: |
          pip install playwright beautifulsoup4
          # Chỉ cài lại trình duyệt nếu cache bị hỏng/thiếu
          playwright install chromium

      - name: Run script
        run: python crawl_thiendinh2.py

      - name: Commit and Push results
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add thiendinh.json thiendinh_vlc.txt thiendinh_iptv.txt
          if git diff --staged --quiet; then
            echo "Không có thay đổi."
          else
            git commit -m "Auto-update $(date +'%Y-%m-%d %H:%M:%S')"
            git push origin main
          fi
