name: Crawl ThienDinh

on:
  schedule:
    # Chạy mỗi giờ từ 17h chiều đến 5h sáng hôm sau (Giờ UTC)
    # Lưu ý: GitHub Actions dùng giờ UTC, bạn nên trừ đi 7 tiếng nếu muốn theo giờ Việt Nam
    - cron: '0 10-22,0-2 * * *' 
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip' # Tự động cache các gói pip

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v3
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-chromium

      - name: Install dependencies
        run: |
          pip install playwright requests Pillow
          # Chỉ cài đặt trình duyệt nếu cache chưa có (giúp tiết kiệm ~30-60s)
          if [ "${{ steps.playwright-cache.outputs.cache-hit }}" != "true" ]; then
            playwright install chromium
          fi

      - name: Run script
        run: python crawl_thiendinh2.py

      - name: Commit and Push results
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-update ${{ github.event.repository.updated_at }}"
          file_pattern: 'thiendinh.json thiendinh_vlc.txt thiendinh_iptv.txt'
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"
